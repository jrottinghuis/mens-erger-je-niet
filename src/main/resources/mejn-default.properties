# Default properties for Mens Erger Je Niet.
# You can override these though system properties (-Dproperty=value as a command line argument)
#  or through mejn-config.xml

#
# Board Settings
#
# Note that: dotsPerPlayer > dieFaces >= pawnsPerPlayer > 0
dieFaces = 6
pawnsPerPlayer = 4
dotsPerPlayer = 10
# 6 player game
#playerCount = 6
#dotsPerPlayer = 8

#
# Rules Settings
#
# Is a player allowed to strike themselves off the regular playing board
#  (other than from start or into home which is never allowed)
# isSelfStrikeAllowed is one of {true,false}
isSelfStrikeAllowed = false

#
# Tournament settings
#
games = 1000
# Number of repeated tournament rounds in TournamentStatistics.
tournamentRounds = 100

#
# TournamentPowerAnalyzer settings
#
# Games played per batch (one batch = one unit of distributed work dispatched to a remote server).
# Larger values reduce RMI round-trip overhead; smaller values allow more frequent variance updates.
# Recommended: 5000 for RMI use, 1000-2000 for local use.
powerAnalyzerGamesPerBatch = 5000
# Minimum batches before the early-stop condition is evaluated.
# Must be >= 2 to have a meaningful variance estimate.
# Games per chunk within a bracket.  Each bracket's games are split into chunks of this
# size and submitted as independent tasks to the work-stealing pool.  Smaller values
# create more tasks, improving core utilisation on many-core machines at negligible
# overhead (~78ms/chunk at 500 games).  Set to gamesPerBatch to disable chunking.
# Rule of thumb: gamesPerBatch / (physicalCores - 1), minimum 100.
powerAnalyzerGamesPerChunk = 500
# Number of initial batches to run before evaluating the early-stop condition.
powerAnalyzerWarmupBatches = 5
# Hard cap on total batches (safety valve).
powerAnalyzerMaxBatches = 128
# Maximum in-flight batches at a time; set to the number of remote compute servers.
powerAnalyzerConcurrency = 1
# Minimum detectable effect (MDE) on the normalized score scale.
# Pairs whose mean difference is smaller than this are declared "practically equivalent".
# Score scale context: 1st place = ~1019 points (4-player), last place = 10.
#  A value of 2.0 means a 2-point difference in mean normalized score is the detection threshold.
#  Strategy paris closer than this are considered equivalent.
powerAnalyzerMde = 10.0

